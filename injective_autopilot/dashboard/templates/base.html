<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Injective Autopilot{% block title %}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  {% if refresh_sec is defined and refresh_sec %}
  <meta http-equiv="refresh" content="{{ refresh_sec }}">
  {% endif %}
  <style>
    body { background: #0d0f14; color: #e0e0e0; font-family: 'Courier New', monospace; }
    .navbar { background: #151820 !important; border-bottom: 1px solid #2a2f3d; }
    .card { background: #151820; border: 1px solid #2a2f3d; }
    .card-header { background: #1a1f2e; border-bottom: 1px solid #2a2f3d; }
    .metric-card { text-align: center; }
    .metric-value { font-size: 2rem; font-weight: bold; }
    .metric-label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    .positive { color: #00e676; }
    .negative { color: #ff5252; }
    .neutral { color: #ffd740; }
    .badge-live { background: #ff5252; }
    .badge-paper { background: #ffd740; color: #000; }
    .badge-backtest { background: #448aff; }
    .signal-badge { font-size: 0.7rem; padding: 2px 6px; margin: 1px; border-radius: 3px; background: #2a2f3d; }
    .kill-active { border: 2px solid #ff5252; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    table { font-size: 0.85rem; }
    .table-dark { --bs-table-bg: #151820; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="/">⚡ Injective Autopilot</a>
      <div class="navbar-nav ms-auto d-flex flex-row gap-3">
        <a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">Overview</a>
        <a class="nav-link {% if request.url.path == '/performance' %}active{% endif %}" href="/performance">Performance</a>
        <a class="nav-link {% if request.url.path == '/journal' %}active{% endif %}" href="/journal">Journal</a>
        <a class="nav-link {% if request.url.path == '/signals' %}active{% endif %}" href="/signals">Signals</a>
        <a class="nav-link {% if request.url.path == '/risk' %}active{% endif %}" href="/risk">Risk</a>
        <a class="nav-link {% if request.url.path == '/ai' %}active{% endif %}" href="/ai">AI</a>
        <a class="nav-link {% if request.url.path == '/analytics' %}active{% endif %}" href="/analytics">Signal Analytics</a>
        <a class="nav-link {% if request.url.path == '/markets' %}active{% endif %}" href="/markets">Markets</a>
        <a class="nav-link {% if request.url.path == '/learning' %}active{% endif %}" href="/learning">Learning</a>
        {% if mode is defined %}
        <span class="badge badge-{{ mode|lower }} align-self-center">{{ mode }}</span>
        {% endif %}
      </div>
    </div>
  </nav>
  <div class="container-fluid px-4 py-3">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
